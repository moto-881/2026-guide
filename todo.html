        <div class="title">
            <span class="sub-title">SOLO LIFE GUIDE</span>
            <h1> 一人の時間を <br>有意義に使おう</h1>
        </div>

        <div class="grid-container">

            <div class="grid-item item-01">
                <img src="images/IMG_1173.jpg" alt="屋上" class=".img-placeholder">
                <div class="content">
                    <span class="number">01</span>
                    <h2>静かな図書館での読書や休憩</h2>
                    <p>人の少ない奥の席で、静かに休憩したり<br>映画を鑑賞したりして感性を磨きましょう</p>
                </div>
            </div>

            <div class="grid-item item-02">
               
                <img src="images/IMG_0984.jpg" alt="屋上" class=".img-placeholder">

                    <span class="number">02</span>
                    <h2>屋上でリフレッシュ</h2>
                    <p>都会の喧騒や学校の人混みから離れて<br>ただぼーっとして頭を休ませましょう</p>
                </div>
            </div>

     
            <div class="grid-item item-03">
               <img src="images/IMG_0549.jpg" alt="屋上" class=".img-placeholder">
                <div class="content">
                    <span class="number">03</span>
                    <h2>空いた時間を使って課題を早めに終わらせよう</h2>
                    <p>空きコマや休講などで微妙に空いた時間にダラダラスマホを触って過ごすのはやめましょう</p>
                </div>
            </div>
            
           
            <div class="grid-item item-04">
               <img src="images/images (40).jpg" alt="屋上" class=".img-placeholder">

                    <span class="number">04</span>
                    <h2>大人を頼りましょう</h2>
                    <p>もう大学生なのに頼るのは恥ずかしいと思わず積極的に大学を使ってボッチを乗り越えよう</p>
                </div>
            </div>
        </div>
